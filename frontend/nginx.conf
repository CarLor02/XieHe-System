# 安全加固: 容器已使用非root用户启动，无需user指令
worker_processes auto;
pid /var/run/nginx.pid;
error_log /var/log/nginx/error.log warn;

events {
    worker_connections 1024;
}

http {
    include       /etc/nginx/mime.types;
    default_type  application/octet-stream;

    # 临时文件路径配置
    client_body_temp_path /var/cache/nginx/client_temp;
    proxy_temp_path /var/cache/nginx/proxy_temp;
    fastcgi_temp_path /var/cache/nginx/fastcgi_temp;
    uwsgi_temp_path /var/cache/nginx/uwsgi_temp;
    scgi_temp_path /var/cache/nginx/scgi_temp;

    # 日志格式
    log_format main '$remote_addr - $remote_user [$time_local] "$request" '
                    '$status $body_bytes_sent "$http_referer" '
                    '"$http_user_agent" "$http_x_forwarded_for"';

    # 访问日志
    access_log /var/log/nginx/access.log main;
    error_log /var/log/nginx/error.log warn;

    # 基本设置
    sendfile on;
    tcp_nopush on;
    tcp_nodelay on;
    keepalive_timeout 65;
    types_hash_max_size 2048;

    # Gzip压缩
    gzip on;
    gzip_vary on;
    gzip_min_length 1024;
    gzip_proxied any;
    gzip_comp_level 6;
    gzip_types
        text/plain
        text/css
        text/xml
        text/javascript
        application/json
        application/javascript
        application/xml+rss
        application/atom+xml
        image/svg+xml;

    server {
        listen 3000;
        server_name localhost;
        root /usr/share/nginx/html;
        index index.html;

        # 安全头
        add_header X-Frame-Options "SAMEORIGIN" always;
        add_header X-XSS-Protection "1; mode=block" always;
        add_header X-Content-Type-Options "nosniff" always;
        add_header Referrer-Policy "no-referrer-when-downgrade" always;
        add_header Content-Security-Policy "default-src 'self' http: https: data: blob: 'unsafe-inline'" always;

        # Next 构建产物带内容 hash，可以长期缓存。
        location ^~ /_next/static/ {
            expires 1y;
            add_header Cache-Control "public, max-age=31536000, immutable" always;
        }

        # 其他静态资源可缓存，降低重复访问流量。
        location ~* \.(js|css|png|jpg|jpeg|gif|ico|svg|webp|avif|woff|woff2|ttf|eot)$ {
            expires 30d;
            add_header Cache-Control "public, max-age=2592000" always;
        }

        # HTML 和 Next 静态导出的路由数据允许缓存，但每次使用前必须校验。
        location ~* \.(html|txt)$ {
            expires off;
            add_header Cache-Control "public, max-age=0, must-revalidate" always;
        }

        # 处理Next.js路由
        location / {
            expires off;
            add_header Cache-Control "public, max-age=0, must-revalidate" always;
            try_files $uri $uri.html $uri/ /index.html;
        }

        # MinIO 私有桶的 presigned URL 代理，路径保持 /bucket/object 以匹配签名。
        location ^~ /medical-image-files/ {
            client_max_body_size 2g;
            proxy_request_buffering off;

            if ($request_method = OPTIONS) {
                add_header Access-Control-Allow-Origin "$http_origin" always;
                add_header Access-Control-Allow-Methods "GET, PUT, OPTIONS" always;
                add_header Access-Control-Allow-Headers "*" always;
                add_header Access-Control-Max-Age 86400 always;
                return 204;
            }

            add_header Access-Control-Allow-Origin "$http_origin" always;
            add_header Access-Control-Expose-Headers "ETag" always;
            proxy_pass http://minio:9000;
            proxy_http_version 1.1;
            proxy_set_header Host $http_host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;
        }

        location ^~ /medical-user-avatars/ {
            client_max_body_size 2g;
            proxy_request_buffering off;

            if ($request_method = OPTIONS) {
                add_header Access-Control-Allow-Origin "$http_origin" always;
                add_header Access-Control-Allow-Methods "GET, PUT, OPTIONS" always;
                add_header Access-Control-Allow-Headers "*" always;
                add_header Access-Control-Max-Age 86400 always;
                return 204;
            }

            add_header Access-Control-Allow-Origin "$http_origin" always;
            add_header Access-Control-Expose-Headers "ETag" always;
            proxy_pass http://minio:9000;
            proxy_http_version 1.1;
            proxy_set_header Host $http_host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;
        }

        # Internal model-service object fetch path. Restricted by source IP and
        # storage-service token; never expose this as a browser image URL.
        # Newer model containers append /objects/{bucket}/{object_key} to
        # STORAGE_SERVICE_URL, so keep this compatibility prefix separate from
        # the older /internal/model-storage/{bucket}/{object_key} form below.
        location ^~ /internal/model-storage/objects/ {
            allow ${MODEL_STORAGE_ALLOWED_CIDR};
            deny all;

            proxy_buffering off;
            proxy_request_buffering off;
            proxy_pass http://storage-service:8090/objects/;
            proxy_http_version 1.1;
            proxy_set_header X-Storage-Service-Token $http_x_storage_service_token;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;
        }

        location ^~ /internal/model-storage/ {
            allow ${MODEL_STORAGE_ALLOWED_CIDR};
            deny all;

            proxy_buffering off;
            proxy_request_buffering off;
            proxy_pass http://storage-service:8090/objects/;
            proxy_http_version 1.1;
            proxy_set_header X-Storage-Service-Token $http_x_storage_service_token;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;
        }

        # 登录/退出后清理旧静态导出缓存，避免部署后继续进入旧页面。
        location ~ ^/api/v1/auth/(login|logout)$ {
            add_header Clear-Site-Data "\"cache\"" always;
            add_header Cache-Control "no-store" always;
            proxy_pass http://backend:8080;
            proxy_http_version 1.1;
            proxy_set_header Upgrade $http_upgrade;
            proxy_set_header Connection 'upgrade';
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;
            proxy_cache_bypass $http_upgrade;
        }

        # API代理到后端
        location /api/ {
            proxy_pass http://backend:8080;
            proxy_http_version 1.1;
            proxy_set_header Upgrade $http_upgrade;
            proxy_set_header Connection 'upgrade';
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;
            proxy_cache_bypass $http_upgrade;
        }

        # 健康检查端点
        location /health {
            access_log off;
            return 200 "healthy\n";
            add_header Content-Type text/plain;
        }
    }
}
