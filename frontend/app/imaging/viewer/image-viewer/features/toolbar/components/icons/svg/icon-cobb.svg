<svg viewBox="0 0 64 64" fill="none" stroke="currentColor" stroke-width="1.2" stroke-linecap="round" stroke-linejoin="round" xmlns="http://www.w3.org/2000/svg">
  <!-- Cobb角 - 脊柱侧弯角度 -->
  <!-- 上端椎体（左倾） -->
  <rect x="22" y="16" width="16" height="8" rx="1" transform="rotate(-12 30 20)" />
  <!-- 中间椎体 -->
  <rect x="26" y="28" width="14" height="7" rx="1" />
  <!-- 下端椎体（右倾） -->
  <rect x="24" y="42" width="16" height="8" rx="1" transform="rotate(10 32 46)" />
  <!-- 上端终板线延长线 -->
  <line x1="12" y1="18" x2="48" y2="14" stroke-dasharray="3,2" opacity="0.7" />
  <!-- 下端终板线延长线 -->
  <line x1="14" y1="48" x2="50" y2="52" stroke-dasharray="3,2" opacity="0.7" />
</svg>
