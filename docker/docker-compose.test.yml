version: '3.8'

services:
  # 测试数据库
  mysql_test:
    image: mysql:8.0
    container_name: medical_mysql_test
    restart: unless-stopped
    environment:
      - MYSQL_ROOT_PASSWORD=test_root_password
      - MYSQL_DATABASE=medical_system_test
      - MYSQL_USER=test_user
      - MYSQL_PASSWORD=test_password
      - MYSQL_CHARACTER_SET_SERVER=utf8mb4
      - MYSQL_COLLATION_SERVER=utf8mb4_unicode_ci
    ports:
      - "3307:3306"
    volumes:
      - mysql_test_data:/var/lib/mysql
      - ./mysql/my.cnf:/etc/mysql/conf.d/my.cnf:ro
    command: --default-authentication-plugin=mysql_native_password
    networks:
      - test_network
    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-h", "localhost", "-u", "root", "-ptest_root_password"]
      interval: 10s
      timeout: 5s
      retries: 5

  # 测试Redis
  redis_test:
    image: redis:7-alpine
    container_name: medical_redis_test
    restart: unless-stopped
    ports:
      - "6380:6379"
    volumes:
      - redis_test_data:/data
    command: redis-server --appendonly yes
    networks:
      - test_network
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 3

  # 测试对象存储
  minio_test:
    image: minio/minio:latest
    container_name: medical_minio_test
    restart: unless-stopped
    environment:
      - MINIO_ROOT_USER=test_minio
      - MINIO_ROOT_PASSWORD=test_minio_password
    ports:
      - "9002:9000"
      - "9003:9001"
    volumes:
      - minio_test_data:/data
    command: server /data --console-address ":9001"
    networks:
      - test_network
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:9000/minio/health/live"]
      interval: 10s
      timeout: 5s
      retries: 5

  minio_init_test:
    image: minio/mc:latest
    container_name: medical_minio_init_test
    depends_on:
      minio_test:
        condition: service_healthy
    environment:
      - MINIO_ROOT_USER=test_minio
      - MINIO_ROOT_PASSWORD=test_minio_password
    networks:
      - test_network
    entrypoint: >
      /bin/sh -c "
      mc alias set local http://minio_test:9000 $$MINIO_ROOT_USER $$MINIO_ROOT_PASSWORD &&
      mc mb --ignore-existing local/medical-image-files &&
      mc mb --ignore-existing local/medical-user-avatars &&
      mc anonymous set none local/medical-image-files &&
      mc anonymous set download local/medical-user-avatars
      "

  storage_service_test:
    build:
      context: ../backend/app/services/internal/storage_service
      dockerfile: Dockerfile
    container_name: medical_storage_service_test
    restart: unless-stopped
    environment:
      - STORAGE_SERVICE_TOKEN=test-storage-service-token
      - MINIO_INTERNAL_ENDPOINT=http://minio_test:9000
      - MINIO_PUBLIC_ENDPOINT=http://minio_test:9000
      - MINIO_ACCESS_KEY=test_minio
      - MINIO_SECRET_KEY=test_minio_password
      - MINIO_REGION=us-east-1
    expose:
      - "8090"
    depends_on:
      minio_test:
        condition: service_healthy
      minio_init_test:
        condition: service_completed_successfully
    networks:
      - test_network
    healthcheck:
      test: ["CMD", "wget", "-qO-", "http://localhost:8090/health"]
      interval: 10s
      timeout: 5s
      retries: 5

  # 后端测试服务
  backend_test:
    build:
      context: ../backend
      dockerfile: Dockerfile
      target: test
    container_name: medical_backend_test
    restart: "no"
    environment:
      - PYTHONPATH=/app
      - ENVIRONMENT=test
      - DATABASE_URL=mysql://test_user:test_password@mysql_test:3306/medical_system_test
      - REDIS_URL=redis://redis_test:6379/0
      - JWT_SECRET_KEY=test_jwt_secret_key
      - STORAGE_SERVICE_URL=http://storage_service_test:8090
      - STORAGE_SERVICE_TOKEN=test-storage-service-token
      - IMAGE_FILE_BUCKET=medical-image-files
      - USER_AVATAR_BUCKET=medical-user-avatars
    volumes:
      - ../backend:/app
    depends_on:
      mysql_test:
        condition: service_healthy
      redis_test:
        condition: service_healthy
      storage_service_test:
        condition: service_healthy
    networks:
      - test_network
    command: sh -c "alembic upgrade head && python -m pytest tests/ -v --cov=app --cov-report=html --cov-report=term"

  # 前端测试服务
  frontend_test:
    build:
      context: ../frontend
      dockerfile: Dockerfile
      target: test
    container_name: medical_frontend_test
    restart: "no"
    environment:
      - NODE_ENV=test
      - NEXT_PUBLIC_API_URL=http://backend_test:8000
    volumes:
      - ../frontend:/app
      - /app/node_modules
    networks:
      - test_network
    command: npm test -- --coverage --watchAll=false

  # E2E测试服务
  e2e_test:
    build:
      context: ../
      dockerfile: tests/e2e/Dockerfile
    container_name: medical_e2e_test
    restart: "no"
    environment:
      - BASE_URL=http://frontend_test:3000
      - API_URL=http://backend_test:8000
    volumes:
      - ../tests:/tests
      - e2e_reports:/tests/reports
    depends_on:
      - frontend_test
      - backend_test
    networks:
      - test_network
    command: npx playwright test --reporter=html

  # 测试报告服务
  test_reports:
    image: nginx:alpine
    container_name: medical_test_reports
    restart: unless-stopped
    ports:
      - "8080:80"
    volumes:
      - e2e_reports:/usr/share/nginx/html/e2e:ro
      - ../backend/htmlcov:/usr/share/nginx/html/backend:ro
      - ../frontend/coverage:/usr/share/nginx/html/frontend:ro
    networks:
      - test_network

volumes:
  mysql_test_data:
    driver: local
  redis_test_data:
    driver: local
  minio_test_data:
    driver: local
  e2e_reports:
    driver: local

networks:
  test_network:
    driver: bridge
