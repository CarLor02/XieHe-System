services:
  minio:
    image: minio/minio:latest
    container_name: medical_minio
    restart: unless-stopped
    command: server /data --console-address ':9001'
    environment:
      MINIO_ROOT_USER: ${MINIO_ROOT_USER:?error}
      MINIO_ROOT_PASSWORD: ${MINIO_ROOT_PASSWORD:?error}
    ports:
      - '${MINIO_API_PORT_BIND:-127.0.0.1:9000:9000}'
      - '${MINIO_CONSOLE_PORT_BIND:-127.0.0.1:9001:9001}'
    volumes:
      - minio_data:/data
    networks:
      - medical_network
    healthcheck:
      test: ['CMD', 'curl', '-f', 'http://localhost:9000/minio/health/live']
      interval: 30s
      timeout: 10s
      retries: 5

  minio-init:
    image: minio/mc:latest
    container_name: medical_minio_init
    depends_on:
      minio:
        condition: service_healthy
    environment:
      MINIO_ROOT_USER: ${MINIO_ROOT_USER:?error}
      MINIO_ROOT_PASSWORD: ${MINIO_ROOT_PASSWORD:?error}
    entrypoint: >
      /bin/sh -c "
      mc alias set local http://minio:9000 $$MINIO_ROOT_USER $$MINIO_ROOT_PASSWORD &&
      mc mb --ignore-existing local/medical-image-files &&
      mc mb --ignore-existing local/medical-user-avatars &&
      mc anonymous set none local/medical-image-files &&
      mc anonymous set download local/medical-user-avatars
      "
    networks:
      - medical_network
