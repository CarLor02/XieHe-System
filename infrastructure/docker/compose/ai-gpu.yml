# GPU override for AI services — layer on top of ai.yml
# Requires: nvidia-container-toolkit installed on the host
# Usage: docker compose -f ai.yml -f ai-gpu.yml ...

services:
  ai-ap:
    deploy:
      resources:
        reservations:
          devices:
            - driver: nvidia
              count: all
              capabilities: [gpu]

  ai-lat:
    deploy:
      resources:
        reservations:
          devices:
            - driver: nvidia
              count: all
              capabilities: [gpu]
