services:
  frontend:
    build:
      context: ../../..
      dockerfile: frontend/Dockerfile
      extra_hosts:
        - 'host.docker.internal:host-gateway'
      args:
        HTTP_PROXY: ${BUILD_HTTP_PROXY:-}
        HTTPS_PROXY: ${BUILD_HTTPS_PROXY:-}
        NO_PROXY: ${BUILD_NO_PROXY:-localhost,127.0.0.1,::1,localaddress,.localdomain}
        http_proxy: ${BUILD_HTTP_PROXY:-}
        https_proxy: ${BUILD_HTTPS_PROXY:-}
        no_proxy: ${BUILD_NO_PROXY:-localhost,127.0.0.1,::1,localaddress,.localdomain}
        NEXT_PUBLIC_API_URL: ${NEXT_PUBLIC_API_URL}
        NEXT_PUBLIC_API_BASE_URL: ${NEXT_PUBLIC_API_BASE_URL}
        NEXT_PUBLIC_API_VERSION: ${NEXT_PUBLIC_API_VERSION}
        NEXT_PUBLIC_WEBSOCKET_URL: ${NEXT_PUBLIC_WEBSOCKET_URL}
        NEXT_PUBLIC_AI_DETECT_URL: ${NEXT_PUBLIC_AI_DETECT_URL}
        NEXT_PUBLIC_AI_DETECT_KEYPOINTS_URL: ${NEXT_PUBLIC_AI_DETECT_KEYPOINTS_URL}
        NEXT_PUBLIC_AI_DETECT_LATERAL_URL: ${NEXT_PUBLIC_AI_DETECT_LATERAL_URL}
        NEXT_PUBLIC_AI_DETECT_LATERAL_DETECT_URL: ${NEXT_PUBLIC_AI_DETECT_LATERAL_DETECT_URL}
        APK_MIRROR: ${BUILD_APK_MIRROR:-}
    container_name: medical_frontend
    restart: unless-stopped
    environment:
      MODEL_STORAGE_ALLOWED_CIDR: ${MODEL_STORAGE_ALLOWED_CIDR:-127.0.0.1/32}
    ports:
      - '${FRONTEND_PORT_BIND}'
    depends_on:
      backend:
        condition: service_healthy
      minio:
        condition: service_healthy
      storage-service:
        condition: service_healthy
    networks:
      - medical_network
    deploy:
      resources:
        limits:
          cpus: '1.0'
          memory: 512M
        reservations:
          cpus: '0.25'
          memory: 128M
    healthcheck:
      test: ['CMD', 'curl', '-f', 'http://localhost:3000']
      interval: 30s
      timeout: 10s
      retries: 3
