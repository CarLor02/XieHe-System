services:
  storage-service:
    build:
      context: ../../../backend/app/services
      dockerfile: storage-service/Dockerfile
      extra_hosts:
        - 'host.docker.internal:host-gateway'
      args:
        HTTP_PROXY: ${BUILD_HTTP_PROXY:-}
        HTTPS_PROXY: ${BUILD_HTTPS_PROXY:-}
        NO_PROXY: ${BUILD_NO_PROXY:-localhost,127.0.0.1,::1,localaddress,.localdomain}
        http_proxy: ${BUILD_HTTP_PROXY:-}
        https_proxy: ${BUILD_HTTPS_PROXY:-}
        no_proxy: ${BUILD_NO_PROXY:-localhost,127.0.0.1,::1,localaddress,.localdomain}
        GOPROXY: ${BUILD_GOPROXY:-https://proxy.golang.org,direct}
        GOSUMDB: ${BUILD_GOSUMDB:-sum.golang.org}
        GONOPROXY: ${BUILD_GONOPROXY:-}
        GONOSUMDB: ${BUILD_GONOSUMDB:-}
    container_name: medical_storage_service
    restart: unless-stopped
    environment:
      STORAGE_SERVICE_TOKEN: ${STORAGE_SERVICE_TOKEN:-dev-storage-service-token}
      MINIO_INTERNAL_ENDPOINT: http://minio:9000
      MINIO_PUBLIC_ENDPOINT: ${MINIO_PUBLIC_ENDPOINT:-http://localhost:3030}
      MINIO_ACCESS_KEY: ${MINIO_ROOT_USER:?error}
      MINIO_SECRET_KEY: ${MINIO_ROOT_PASSWORD:?error}
      MINIO_REGION: ${MINIO_REGION:-us-east-1}
      STORAGE_SERVICE_READ_HEADER_TIMEOUT: ${STORAGE_SERVICE_READ_HEADER_TIMEOUT:-5s}
      STORAGE_SERVICE_READ_TIMEOUT: ${STORAGE_SERVICE_READ_TIMEOUT:-30s}
      STORAGE_SERVICE_WRITE_TIMEOUT: ${STORAGE_SERVICE_WRITE_TIMEOUT:-120s}
      STORAGE_SERVICE_IDLE_TIMEOUT: ${STORAGE_SERVICE_IDLE_TIMEOUT:-60s}
      STORAGE_SERVICE_MAX_UPLOAD_BYTES: ${STORAGE_SERVICE_MAX_UPLOAD_BYTES:-536870912}
      NO_PROXY: ${NO_PROXY:-localhost,127.0.0.1,::1},mysql,redis,minio,storage-service,backend,frontend,medical_mysql,medical_redis,medical_minio,medical_storage_service,medical_backend,medical_frontend
      no_proxy: ${no_proxy:-localhost,127.0.0.1,::1},mysql,redis,minio,storage-service,backend,frontend,medical_mysql,medical_redis,medical_minio,medical_storage_service,medical_backend,medical_frontend
    ports:
      - '${STORAGE_SERVICE_PORT_BIND:-127.0.0.1:8090:8090}'
    depends_on:
      minio:
        condition: service_healthy
      minio-init:
        condition: service_completed_successfully
    networks:
      - medical_network
    healthcheck:
      test: ['CMD', 'wget', '-Y', 'off', '-qO-', 'http://127.0.0.1:8090/health']
      interval: 30s
      timeout: 10s
      retries: 5
