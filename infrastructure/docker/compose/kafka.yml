services:
  kafka:
    image: apache/kafka:${KAFKA_IMAGE_TAG:-4.2.0}
    container_name: medical_kafka
    restart: unless-stopped
    environment:
      KAFKA_NODE_ID: ${KAFKA_NODE_ID:-1}
      KAFKA_PROCESS_ROLES: broker,controller
      KAFKA_LISTENERS: PLAINTEXT://:9092,CONTROLLER://:9093
      KAFKA_ADVERTISED_LISTENERS: PLAINTEXT://kafka:9092
      KAFKA_CONTROLLER_LISTENER_NAMES: CONTROLLER
      KAFKA_LISTENER_SECURITY_PROTOCOL_MAP: CONTROLLER:PLAINTEXT,PLAINTEXT:PLAINTEXT
      KAFKA_CONTROLLER_QUORUM_VOTERS: ${KAFKA_NODE_ID:-1}@kafka:9093
      KAFKA_OFFSETS_TOPIC_REPLICATION_FACTOR: 1
      KAFKA_TRANSACTION_STATE_LOG_REPLICATION_FACTOR: 1
      KAFKA_TRANSACTION_STATE_LOG_MIN_ISR: 1
      KAFKA_GROUP_INITIAL_REBALANCE_DELAY_MS: 0
      KAFKA_NUM_PARTITIONS: ${KAFKA_NUM_PARTITIONS:-3}
      KAFKA_LOG_DIRS: /var/lib/kafka/data
    expose:
      - '9092'
    volumes:
      - kafka_data:/var/lib/kafka/data
    networks:
      - medical_network
    healthcheck:
      test: ['CMD', '/opt/kafka/bin/kafka-topics.sh', '--bootstrap-server', 'localhost:9092', '--list']
      interval: 15s
      timeout: 10s
      retries: 10
      start_period: 30s

  kafka-init:
    image: apache/kafka:${KAFKA_IMAGE_TAG:-4.2.0}
    container_name: medical_kafka_init
    restart: "no"
    depends_on:
      kafka:
        condition: service_healthy
    environment:
      LOGGING_KAFKA_TOPIC: ${LOGGING_KAFKA_TOPIC:-logging.events.v1}
      LOGGING_KAFKA_PARTITIONS: ${LOGGING_KAFKA_PARTITIONS:-${KAFKA_NUM_PARTITIONS:-3}}
      AI_TASK_KAFKA_TOPIC: ${AI_TASK_KAFKA_TOPIC:-medical.image-ai.predict.v1}
      AI_TASK_KAFKA_PARTITIONS: ${AI_TASK_KAFKA_PARTITIONS:-${KAFKA_NUM_PARTITIONS:-3}}
      KAFKA_REPLICATION_FACTOR: ${KAFKA_REPLICATION_FACTOR:-1}
    command:
      - /bin/sh
      - -ec
      - |
        /opt/kafka/bin/kafka-topics.sh \
          --bootstrap-server kafka:9092 \
          --create \
          --if-not-exists \
          --topic "$$LOGGING_KAFKA_TOPIC" \
          --partitions "$$LOGGING_KAFKA_PARTITIONS" \
          --replication-factor "$$KAFKA_REPLICATION_FACTOR"
        /opt/kafka/bin/kafka-topics.sh \
          --bootstrap-server kafka:9092 \
          --describe \
          --topic "$$LOGGING_KAFKA_TOPIC"
        /opt/kafka/bin/kafka-topics.sh \
          --bootstrap-server kafka:9092 \
          --create \
          --if-not-exists \
          --topic "$$AI_TASK_KAFKA_TOPIC" \
          --partitions "$$AI_TASK_KAFKA_PARTITIONS" \
          --replication-factor "$$KAFKA_REPLICATION_FACTOR"
        /opt/kafka/bin/kafka-topics.sh \
          --bootstrap-server kafka:9092 \
          --describe \
          --topic "$$AI_TASK_KAFKA_TOPIC"
    networks:
      - medical_network
