# AI inference services (optional, included by deploy_pc.sh --with-ai)
# ap = 正面/front-view analysis  (port 8001)
# lat    = 侧面/lateral-view analysis (port 8002)
# NOTE: When running AI models on host (not in Docker), see model/AI_HOST_DEPLOYMENT.md

services:
  ai-ap:
    build:
      context: ../../../model/ap
      dockerfile: Dockerfile
      extra_hosts:
        - 'host.docker.internal:host-gateway'
      args:
        HTTP_PROXY: ${BUILD_HTTP_PROXY:-}
        HTTPS_PROXY: ${BUILD_HTTPS_PROXY:-}
        NO_PROXY: ${BUILD_NO_PROXY:-localhost,127.0.0.1,::1,localaddress,.localdomain}
        http_proxy: ${BUILD_HTTP_PROXY:-}
        https_proxy: ${BUILD_HTTPS_PROXY:-}
        no_proxy: ${BUILD_NO_PROXY:-localhost,127.0.0.1,::1,localaddress,.localdomain}
        PIP_INDEX_URL: ${BUILD_PIP_INDEX_URL:-}
        PIP_TRUSTED_HOST: ${BUILD_PIP_TRUSTED_HOST:-}
    image: xiehe-ai-ap
    container_name: medical_ai_ap
    restart: unless-stopped
    environment:
      STORAGE_SERVICE_URL: ${STORAGE_SERVICE_URL:-http://storage-service:8090}
      STORAGE_SERVICE_TOKEN: ${STORAGE_SERVICE_TOKEN:-dev-storage-service-token}
      STORAGE_SERVICE_TIMEOUT: ${STORAGE_SERVICE_TIMEOUT:-30}
    ports:
      - '${AI_AP_PORT_BIND:-0.0.0.0:8001:8001}'
    depends_on:
      storage-service:
        condition: service_healthy
    networks:
      - medical_network
    healthcheck:
      test: ['CMD', 'python', '-c', "import urllib.request; urllib.request.urlopen('http://localhost:8001/health')"]
      interval: 60s
      timeout: 15s
      start_period: 60s
      retries: 3

  ai-lat:
    build:
      context: ../../../model/lat
      dockerfile: Dockerfile
      extra_hosts:
        - 'host.docker.internal:host-gateway'
      args:
        HTTP_PROXY: ${BUILD_HTTP_PROXY:-}
        HTTPS_PROXY: ${BUILD_HTTPS_PROXY:-}
        NO_PROXY: ${BUILD_NO_PROXY:-localhost,127.0.0.1,::1,localaddress,.localdomain}
        http_proxy: ${BUILD_HTTP_PROXY:-}
        https_proxy: ${BUILD_HTTPS_PROXY:-}
        no_proxy: ${BUILD_NO_PROXY:-localhost,127.0.0.1,::1,localaddress,.localdomain}
        PIP_INDEX_URL: ${BUILD_PIP_INDEX_URL:-}
        PIP_TRUSTED_HOST: ${BUILD_PIP_TRUSTED_HOST:-}
    image: xiehe-ai-lat
    container_name: medical_ai_lat
    restart: unless-stopped
    environment:
      STORAGE_SERVICE_URL: ${STORAGE_SERVICE_URL:-http://storage-service:8090}
      STORAGE_SERVICE_TOKEN: ${STORAGE_SERVICE_TOKEN:-dev-storage-service-token}
      STORAGE_SERVICE_TIMEOUT: ${STORAGE_SERVICE_TIMEOUT:-30}
    ports:
      - '${AI_LAT_PORT_BIND:-0.0.0.0:8002:8002}'
    depends_on:
      storage-service:
        condition: service_healthy
    networks:
      - medical_network
    healthcheck:
      test: ['CMD', 'python', '-c', "import urllib.request; urllib.request.urlopen('http://localhost:8002/health')"]
      interval: 60s
      timeout: 15s
      start_period: 60s
      retries: 3
