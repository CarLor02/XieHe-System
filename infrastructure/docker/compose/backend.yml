services:
  backend:
    image: xiehe-medical-backend:local
    build:
      context: ../../..
      dockerfile: backend/Dockerfile
      extra_hosts:
        - 'host.docker.internal:host-gateway'
      args:
        HTTP_PROXY: ${BUILD_HTTP_PROXY:-}
        HTTPS_PROXY: ${BUILD_HTTPS_PROXY:-}
        NO_PROXY: ${BUILD_NO_PROXY:-localhost,127.0.0.1,::1,localaddress,.localdomain}
        http_proxy: ${BUILD_HTTP_PROXY:-}
        https_proxy: ${BUILD_HTTPS_PROXY:-}
        no_proxy: ${BUILD_NO_PROXY:-localhost,127.0.0.1,::1,localaddress,.localdomain}
        PIP_INDEX_URL: ${BUILD_PIP_INDEX_URL:-}
        PIP_EXTRA_INDEX_URL: ${BUILD_PIP_EXTRA_INDEX_URL:-}
        PIP_TRUSTED_HOST: ${BUILD_PIP_TRUSTED_HOST:-}
        PIP_TIMEOUT: ${BUILD_PIP_TIMEOUT:-120}
        APT_MIRROR: ${BUILD_APT_MIRROR:-}
    container_name: medical_backend
    restart: unless-stopped
    extra_hosts:
      - 'host.docker.internal:host-gateway'
    environment:
      PYTHONPATH: ${PYTHONPATH}
      ENVIRONMENT: ${ENVIRONMENT}
      DATABASE_URL: ${DATABASE_URL}
      REDIS_URL: ${REDIS_URL}
      DB_HOST: ${DB_HOST}
      DB_PORT: ${DB_PORT}
      DB_USER: ${DB_USER}
      DB_PASSWORD: ${DB_PASSWORD}
      DB_NAME: ${DB_NAME}
      JWT_SECRET_KEY: ${JWT_SECRET_KEY}
      BACKEND_CORS_ORIGINS: ${BACKEND_CORS_ORIGINS:-${CORS_ORIGINS:-*}}
      FORWARDED_ALLOW_IPS: ${FORWARDED_ALLOW_IPS}
      STORAGE_SERVICE_URL: ${STORAGE_SERVICE_URL:-http://storage-service:8090}
      STORAGE_SERVICE_TOKEN: ${STORAGE_SERVICE_TOKEN:-dev-storage-service-token}
      LOGGING_SERVICE_URL: ${LOGGING_SERVICE_URL:-http://logging-service:8091}
      LOGGING_SERVICE_TOKEN: ${LOGGING_SERVICE_TOKEN:-dev-logging-service-token}
      LOGGING_SERVICE_TIMEOUT: ${LOGGING_SERVICE_TIMEOUT:-2.0}
      AI_AP_MEASUREMENT_OBJECT_URL: ${AI_AP_MEASUREMENT_OBJECT_URL:-}
      AI_LAT_MEASUREMENT_OBJECT_URL: ${AI_LAT_MEASUREMENT_OBJECT_URL:-}
      AI_OBJECT_CONCURRENCY_LIMIT: ${AI_OBJECT_CONCURRENCY_LIMIT:-50}
      BATCH_IMPORT_MAX_FILES: ${BATCH_IMPORT_MAX_FILES:-200}
      KAFKA_BOOTSTRAP_SERVERS: ${KAFKA_BOOTSTRAP_SERVERS:-kafka:9092}
      AI_TASK_KAFKA_TOPIC: ${AI_TASK_KAFKA_TOPIC:-medical.image-ai.predict.v1}
      BATCH_PRESIGN_CONCURRENCY_LIMIT: ${BATCH_PRESIGN_CONCURRENCY_LIMIT:-100}
      LEGACY_DIAGNOSIS_CONCURRENCY_LIMIT: ${LEGACY_DIAGNOSIS_CONCURRENCY_LIMIT:-100}
      REPORT_EXPORT_CONCURRENCY_LIMIT: ${REPORT_EXPORT_CONCURRENCY_LIMIT:-100}
      IMAGE_FILE_BUCKET: ${IMAGE_FILE_BUCKET:-medical-image-files}
      USER_AVATAR_BUCKET: ${USER_AVATAR_BUCKET:-medical-user-avatars}
      NO_PROXY: ${NO_PROXY:-localhost,127.0.0.1,::1},mysql,redis,minio,kafka,storage-service,logging-service,backend,frontend,medical_mysql,medical_redis,medical_minio,medical_kafka,medical_storage_service,medical_logging_service,medical_backend,medical_frontend
      no_proxy: ${no_proxy:-localhost,127.0.0.1,::1},mysql,redis,minio,kafka,storage-service,logging-service,backend,frontend,medical_mysql,medical_redis,medical_minio,medical_kafka,medical_storage_service,medical_logging_service,medical_backend,medical_frontend
    ports:
      - '${BACKEND_PORT_BIND}'
    volumes:
      - models_data:/app/models
    depends_on:
      mysql:
        condition: service_healthy
      redis:
        condition: service_healthy
      storage-service:
        condition: service_healthy
      logging-service:
        condition: service_healthy
      kafka-init:
        condition: service_completed_successfully
    networks:
      - medical_network
    healthcheck:
      test: ['CMD', 'curl', '-f', 'http://localhost:8080/health']
      timeout: 10s
      retries: 5

  ai-worker:
    image: xiehe-medical-backend:local
    pull_policy: never
    container_name: medical_ai_worker
    restart: unless-stopped
    entrypoint: ['python', '-m', 'app.workers.ai_worker']
    healthcheck:
      disable: true
    environment:
      PYTHONPATH: ${PYTHONPATH}
      ENVIRONMENT: ${ENVIRONMENT}
      DATABASE_URL: ${DATABASE_URL}
      DB_HOST: ${DB_HOST}
      DB_PORT: ${DB_PORT}
      DB_USER: ${DB_USER}
      DB_PASSWORD: ${DB_PASSWORD}
      DB_NAME: ${DB_NAME}
      REDIS_URL: ${REDIS_URL}
      LOGGING_SERVICE_URL: ${LOGGING_SERVICE_URL:-http://logging-service:8091}
      LOGGING_SERVICE_TOKEN: ${LOGGING_SERVICE_TOKEN:-dev-logging-service-token}
      AI_AP_MEASUREMENT_OBJECT_URL: ${AI_AP_MEASUREMENT_OBJECT_URL:-}
      AI_LAT_MEASUREMENT_OBJECT_URL: ${AI_LAT_MEASUREMENT_OBJECT_URL:-}
      AI_MODEL_TIMEOUT: ${AI_MODEL_TIMEOUT:-30}
      AI_MODEL_MAX_RETRIES: ${AI_MODEL_MAX_RETRIES:-3}
      KAFKA_BOOTSTRAP_SERVERS: ${KAFKA_BOOTSTRAP_SERVERS:-kafka:9092}
      AI_TASK_KAFKA_TOPIC: ${AI_TASK_KAFKA_TOPIC:-medical.image-ai.predict.v1}
      AI_TASK_KAFKA_GROUP_ID: ${AI_TASK_KAFKA_GROUP_ID:-medical-image-ai-worker-v1}
      AI_WORKER_CONCURRENCY: ${AI_WORKER_CONCURRENCY:-2}
      NO_PROXY: ${NO_PROXY:-localhost,127.0.0.1,::1},mysql,redis,minio,kafka,storage-service,logging-service,backend,medical_mysql,medical_redis,medical_minio,medical_kafka,medical_storage_service,medical_logging_service,medical_backend
      no_proxy: ${no_proxy:-localhost,127.0.0.1,::1},mysql,redis,minio,kafka,storage-service,logging-service,backend,medical_mysql,medical_redis,medical_minio,medical_kafka,medical_storage_service,medical_logging_service,medical_backend
    depends_on:
      backend:
        condition: service_healthy
      kafka-init:
        condition: service_completed_successfully
    networks:
      - medical_network
