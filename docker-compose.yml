services:
  # Redis 缓存
  redis:
    image: redis:7-alpine
    container_name: medical_redis
    restart: unless-stopped
    ports:
      - '${REDIS_PORT_BIND}'
    volumes:
      - redis_data:/data
      - redis_logs:/var/log/redis
      - ./docker/redis/redis.conf:/usr/local/etc/redis/redis.conf:ro
    command: redis-server /usr/local/etc/redis/redis.conf
    networks:
      - medical_network
    healthcheck:
      test: ['CMD', 'redis-cli', 'ping']
      timeout: 10s
      retries: 5

  # MinIO 对象存储
  minio:
    image: minio/minio:latest
    container_name: medical_minio
    restart: unless-stopped
    command: server /data --console-address ':9001'
    environment:
      MINIO_ROOT_USER: ${MINIO_ROOT_USER:?error}
      MINIO_ROOT_PASSWORD: ${MINIO_ROOT_PASSWORD:?error}
    ports:
      - '${MINIO_API_PORT_BIND:-127.0.0.1:9000:9000}'
      - '${MINIO_CONSOLE_PORT_BIND:-127.0.0.1:9001:9001}'
    volumes:
      - minio_data:/data
    networks:
      - medical_network
    healthcheck:
      test: ['CMD', 'curl', '-f', 'http://localhost:9000/minio/health/live']
      interval: 30s
      timeout: 10s
      retries: 5

  minio-init:
    image: minio/mc:latest
    container_name: medical_minio_init
    depends_on:
      minio:
        condition: service_healthy
    environment:
      MINIO_ROOT_USER: ${MINIO_ROOT_USER:?error}
      MINIO_ROOT_PASSWORD: ${MINIO_ROOT_PASSWORD:?error}
    entrypoint: >
      /bin/sh -c "
      mc alias set local http://minio:9000 $$MINIO_ROOT_USER $$MINIO_ROOT_PASSWORD &&
      mc mb --ignore-existing local/medical-image-files &&
      mc mb --ignore-existing local/medical-user-avatars &&
      mc anonymous set none local/medical-image-files &&
      mc anonymous set download local/medical-user-avatars
      "
    networks:
      - medical_network

  storage-service:
    build:
      context: ./backend/app/services/internal/storage_service
      dockerfile: Dockerfile
    container_name: medical_storage_service
    restart: unless-stopped
    environment:
      STORAGE_SERVICE_TOKEN: ${STORAGE_SERVICE_TOKEN:-dev-storage-service-token}
      MINIO_INTERNAL_ENDPOINT: http://minio:9000
      MINIO_PUBLIC_ENDPOINT: ${MINIO_PUBLIC_ENDPOINT:-http://localhost:3030}
      MINIO_ACCESS_KEY: ${MINIO_ROOT_USER:?error}
      MINIO_SECRET_KEY: ${MINIO_ROOT_PASSWORD:?error}
      MINIO_REGION: ${MINIO_REGION:-us-east-1}
    expose:
      - '8090'
    depends_on:
      minio:
        condition: service_healthy
      minio-init:
        condition: service_completed_successfully
    networks:
      - medical_network
    healthcheck:
      test: ['CMD', 'wget', '-qO-', 'http://localhost:8090/health']
      interval: 30s
      timeout: 10s
      retries: 5

  # MySQL 数据库
  mysql:
    image: mysql:8.0
    container_name: medical_mysql
    restart: unless-stopped
    environment:
      MYSQL_ROOT_PASSWORD: ${MYSQL_ROOT_PASSWORD}
      MYSQL_DATABASE: ${MYSQL_DATABASE}
      MYSQL_CHARACTER_SET_SERVER: ${MYSQL_CHARACTER_SET_SERVER}
      MYSQL_COLLATION_SERVER: ${MYSQL_COLLATION_SERVER}
    ports:
      - '${MYSQL_PORT_BIND}'
    volumes:
      - mysql_data:/var/lib/mysql
      - mysql_logs:/var/log/mysql
    command: --default-authentication-plugin=mysql_native_password --max_connections=1000
    networks:
      - medical_network
    healthcheck:
      test: ['CMD-SHELL', 'mysqladmin ping -h localhost -u root -p"$$MYSQL_ROOT_PASSWORD"']
      interval: 10s
      timeout: 5s
      retries: 10

  # 后端 API 服务
  backend:
    build:
      context: .
      dockerfile: Dockerfile.backend
    container_name: medical_backend
    restart: unless-stopped
    environment:
      PYTHONPATH: ${PYTHONPATH}
      ENVIRONMENT: ${ENVIRONMENT}
      DATABASE_URL: ${DATABASE_URL}
      REDIS_URL: ${REDIS_URL}
      DB_HOST: ${DB_HOST}
      DB_PORT: ${DB_PORT}
      DB_USER: ${DB_USER}
      DB_PASSWORD: ${DB_PASSWORD}
      DB_NAME: ${DB_NAME}
      JWT_SECRET_KEY: ${JWT_SECRET_KEY}
      CORS_ORIGINS: ${CORS_ORIGINS}
      FORWARDED_ALLOW_IPS: ${FORWARDED_ALLOW_IPS}
      STORAGE_SERVICE_URL: http://storage-service:8090
      STORAGE_SERVICE_TOKEN: ${STORAGE_SERVICE_TOKEN:-dev-storage-service-token}
      IMAGE_FILE_BUCKET: medical-image-files
      USER_AVATAR_BUCKET: medical-user-avatars
    ports:
      - '${BACKEND_PORT_BIND}'
    volumes:
      - models_data:/app/models
    depends_on:
      mysql:
        condition: service_healthy
      redis:
        condition: service_healthy
      storage-service:
        condition: service_healthy
    networks:
      - medical_network
    healthcheck:
      test: ['CMD', 'curl', '-f', 'http://localhost:8080/health']
      timeout: 10s
      retries: 5

  # 前端应用 - Nginx 静态服务器
  frontend:
    build:
      context: .
      dockerfile: Dockerfile.frontend
      args:
        NEXT_PUBLIC_API_URL: ${NEXT_PUBLIC_API_URL}
        NEXT_PUBLIC_API_BASE_URL: ${NEXT_PUBLIC_API_BASE_URL}
        NEXT_PUBLIC_API_VERSION: ${NEXT_PUBLIC_API_VERSION}
        NEXT_PUBLIC_WEBSOCKET_URL: ${NEXT_PUBLIC_WEBSOCKET_URL}
        NEXT_PUBLIC_AI_DETECT_URL: ${NEXT_PUBLIC_AI_DETECT_URL}
        NEXT_PUBLIC_AI_DETECT_KEYPOINTS_URL: ${NEXT_PUBLIC_AI_DETECT_KEYPOINTS_URL}
        NEXT_PUBLIC_AI_DETECT_LATERAL_URL: ${NEXT_PUBLIC_AI_DETECT_LATERAL_URL}
        NEXT_PUBLIC_AI_DETECT_LATERAL_DETECT_URL: ${NEXT_PUBLIC_AI_DETECT_LATERAL_DETECT_URL}
    container_name: medical_frontend
    restart: unless-stopped
    ports:
      - '${FRONTEND_PORT_BIND}'
    depends_on:
      - backend
      - minio
    networks:
      - medical_network
    deploy:
      resources:
        limits:
          cpus: '1.0'
          memory: 512M
        reservations:
          cpus: '0.25'
          memory: 128M
    healthcheck:
      test: ['CMD', 'curl', '-f', 'http://localhost:3000']
      interval: 30s
      timeout: 10s
      retries: 3

volumes:
  mysql_data:
    driver: local
  mysql_logs:
    driver: local
  redis_data:
    driver: local
  redis_logs:
    driver: local
  minio_data:
    driver: local
  models_data:
    driver: local

networks:
  medical_network:
    driver: bridge
