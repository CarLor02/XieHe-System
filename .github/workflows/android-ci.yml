name: Android CI + Release

on:
  push:
    branches: ["dev", "main"]
    tags:
      - "v*"
  pull_request:
    branches: ["dev", "main"]
    paths:
      - "mobile/**"

permissions:
  contents: read

jobs:
  ci:
    name: CI
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: mobile

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Setup JDK 17
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: '17'

      - name: Setup Gradle
        uses: gradle/actions/setup-gradle@v4

      - name: Build Debug APK
        run: ./gradlew :composeApp:testAndroidHostTest :androidApp:assembleDebug --stacktrace

      - name: Upload Debug APK Artifact
        uses: actions/upload-artifact@v4
        with:
          name: composeApp-debug-apk
          path: mobile/androidApp/build/outputs/apk/debug/*.apk
          if-no-files-found: error

  release:
    name: Release APK
    needs: ci
    if: ${{ github.event_name == 'push' && startsWith(github.ref, 'refs/tags/') }}
    runs-on: ubuntu-latest
    permissions:
      contents: write
    defaults:
      run:
        working-directory: mobile

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup JDK 17
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: "17"

      - name: Setup Gradle
        uses: gradle/actions/setup-gradle@v4

      - name: Compute Release Profile
        id: meta
        shell: bash
        run: |
          TAG="${GITHUB_REF_NAME}"
          SHA="${GITHUB_SHA}"
          git -C "$GITHUB_WORKSPACE" fetch --no-tags origin dev main

          IN_DEV=false
          IN_MAIN=false
          if git -C "$GITHUB_WORKSPACE" merge-base --is-ancestor "$SHA" "origin/dev"; then
            IN_DEV=true
          fi
          if git -C "$GITHUB_WORKSPACE" merge-base --is-ancestor "$SHA" "origin/main"; then
            IN_MAIN=true
          fi

          if [[ "$IN_MAIN" == "true" ]]; then
            echo "allow_cleartext=false" >> "$GITHUB_OUTPUT"
            echo "prerelease=false" >> "$GITHUB_OUTPUT"
            echo "release_name=Android Main APK ${TAG}" >> "$GITHUB_OUTPUT"
          elif [[ "$IN_DEV" == "true" ]]; then
            echo "allow_cleartext=true" >> "$GITHUB_OUTPUT"
            echo "prerelease=true" >> "$GITHUB_OUTPUT"
            echo "release_name=Android Dev APK ${TAG}" >> "$GITHUB_OUTPUT"
          else
            # Fallback for unknown branch ancestry: keep previous suffix behavior.
            if [[ "$TAG" == *_dev ]]; then
              echo "allow_cleartext=true" >> "$GITHUB_OUTPUT"
              echo "prerelease=true" >> "$GITHUB_OUTPUT"
              echo "release_name=Android Dev APK ${TAG}" >> "$GITHUB_OUTPUT"
            else
              echo "allow_cleartext=false" >> "$GITHUB_OUTPUT"
              echo "prerelease=false" >> "$GITHUB_OUTPUT"
              echo "release_name=Android Main APK ${TAG}" >> "$GITHUB_OUTPUT"
            fi
          fi

      - name: Build Debug APK For Release
        run: ./gradlew :androidApp:assembleDebug -PallowCleartextTraffic=${{ steps.meta.outputs.allow_cleartext }} --stacktrace

      - name: Normalize APK name
        shell: bash
        run: |
          APK_PATH=$(ls androidApp/build/outputs/apk/debug/*.apk | head -n1)
          cp "$APK_PATH" xiehe-spine.apk

      - name: Publish APK to GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ github.ref_name }}
          name: ${{ steps.meta.outputs.release_name }}
          prerelease: ${{ steps.meta.outputs.prerelease }}
          files: mobile/xiehe-spine.apk
          fail_on_unmatched_files: true
